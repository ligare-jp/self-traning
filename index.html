<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligare — 自主トレ動画処方</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --brand:#d2e0e1;
    --primary-900:#2a4a5e;--primary-700:#3c5c72;--primary-500:#5a8f92;--primary-300:#94bec0;
    --primary-100:#d2e0e1;--primary-50:#edf4f4;
    --n900:#3c5c72;--n700:#3c5c72;--n500:#5e7273;--n300:#a8babb;
    --n100:#dde8e8;--n50:#f2f7f7;--white:#ffffff;--error:#b84040;
    --font-body:'Noto Sans JP',sans-serif;--font-ui:'Inter',sans-serif;
    --radius:10px;
    --shadow-sm:0 1px 4px rgba(46,74,76,.08);
    --shadow-md:0 4px 16px rgba(46,74,76,.12);
    --shadow-lg:0 8px 32px rgba(46,74,76,.18);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-body);background:var(--n50);color:var(--n900);min-height:100vh;line-height:1.6;}

  .topbar{background:var(--white);border-bottom:1.5px solid var(--n100);padding:0 24px;height:60px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--font-ui);font-weight:600;font-size:14px;color:var(--primary-700);letter-spacing:.5px;}
  .logo-mark{width:32px;height:32px;background:var(--primary-700);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:16px;}
  .mode-tabs{display:flex;gap:4px;background:var(--n100);border-radius:8px;padding:3px;}
  .mode-tab{font-family:var(--font-ui);font-size:13px;font-weight:500;padding:6px 16px;border-radius:6px;border:none;cursor:pointer;transition:all .18s;color:var(--n500);background:transparent;}
  .mode-tab.active{background:var(--white);color:var(--primary-700);box-shadow:var(--shadow-sm);}

  .page{display:none;} .page.active{display:block;}

  .staff-layout{max-width:960px;margin:0 auto;padding:32px 24px;}
  .card{background:var(--white);border-radius:var(--radius);border:1.5px solid var(--n100);padding:24px;margin-bottom:24px;box-shadow:var(--shadow-sm);}
  .card-title{font-size:13px;font-weight:700;color:#3c5c72;letter-spacing:.6px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .card-title::before{content:'';display:inline-block;width:3px;height:14px;background:#3c5c72;border-radius:2px;}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group label{font-size:12px;font-weight:500;color:var(--n700);}
  .form-group input,.form-group select,.form-group textarea{
    font-family:var(--font-body);font-size:14px;padding:9px 12px;
    border:1.5px solid var(--n100);border-radius:7px;outline:none;transition:border-color .15s;
    background:var(--white);color:var(--n900);}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{
    border-color:var(--primary-500);box-shadow:0 0 0 3px rgba(23,143,143,.1);}

  .cat-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .cat-tabs-label{font-size:11px;font-family:var(--font-ui);font-weight:600;color:var(--n500);margin-bottom:6px;}
  .cat-tab{font-family:var(--font-ui);font-size:13px;padding:6px 14px;border-radius:20px;
    border:1.5px solid var(--n100);cursor:pointer;transition:all .15s;background:var(--white);color:var(--n700);font-weight:500;}
  .cat-tab:hover{border-color:var(--primary-300);color:var(--primary-700);}
  .cat-tab.active{background:var(--primary-700);border-color:var(--primary-700);color:var(--white);}
  .purpose-tab.active{background:#e8eeee;border-color:#e8eeee;color:#3c5c72;}
  .filter-block{margin-bottom:10px;}

  /* VIDEO LIST (replaces grid) */
  .video-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
  .video-row{display:flex;align-items:center;gap:12px;padding:10px 14px;
    border:1.5px solid var(--n100);border-radius:8px;background:var(--white);
    transition:all .15s;cursor:pointer;user-select:none;}
  .video-row:hover{border-color:var(--primary-300);background:var(--primary-50);}
  .video-row.selected{border-color:var(--primary-300);background:#f4f8f8;}
  .vr-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--n100);
    display:flex;align-items:center;justify-content:center;font-size:11px;
    font-weight:700;flex-shrink:0;transition:all .15s;color:transparent;}
  .video-row.selected .vr-check{background:var(--primary-500);border-color:var(--primary-500);color:white;}
  .vr-info{display:flex;flex-direction:column;gap:7px;flex:1;min-width:0;}
  .vr-name{font-size:15px;font-weight:600;color:var(--n900);line-height:1.3;}
  .vr-tags{display:flex;gap:5px;flex-wrap:wrap;}
  .vr-cat{font-size:11px;font-family:var(--font-ui);font-weight:400;color:#3c5c72;
    background:#e8eeee;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .vr-purpose{font-size:11px;font-family:var(--font-ui);font-weight:400;color:#3c5c72;
    background:#e8eeee;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .video-group{margin-bottom:18px;}
  .video-group-title{font-size:12px;font-family:var(--font-ui);font-weight:700;color:var(--primary-700);
    letter-spacing:.5px;margin-bottom:8px;padding-left:2px;}
  .vr-preview{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--primary-300);
    background:transparent;color:var(--primary-700);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;transition:all .15s;flex-shrink:0;padding-left:2px;}
  .vr-preview:hover{background:var(--primary-50);border-color:var(--primary-500);}

  /* PREVIEW MODAL */
  .preview-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
    z-index:500;align-items:center;justify-content:center;padding:12px;}
  .preview-modal.show{display:flex;}
  .preview-box{background:var(--white);border-radius:14px;overflow:hidden;
    width:100%;max-width:720px;box-shadow:var(--shadow-lg);
    display:flex;flex-direction:column;max-height:calc(100vh - 24px);}
  .preview-header{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1.5px solid var(--n100);flex-shrink:0;}
  .preview-header h3{font-size:15px;font-weight:600;color:var(--n900);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;}
  .preview-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--n100);
    color:var(--n500);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .15s;flex-shrink:0;}
  .preview-close:hover{background:#fde8e8;color:var(--error);}
  .preview-embed{width:100%;aspect-ratio:16/9;border:none;display:block;flex-shrink:1;min-height:0;}

  .add-video-form{background:var(--n50);border:1.5px dashed var(--n300);border-radius:var(--radius);padding:20px;margin-bottom:20px;}

  .selected-list{display:flex;flex-direction:column;gap:8px;}
  .selected-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
    background:var(--primary-50);border:1.5px solid var(--primary-100);border-radius:8px;flex-wrap:wrap;}
  .si-cat{font-size:11px;font-family:var(--font-ui);font-weight:700;color:var(--white);
    background:#7a9db5;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .si-name{font-size:14px;flex:1;min-width:100px;}
  .btn-remove{width:26px;height:26px;border-radius:50%;border:none;background:var(--n100);
    color:var(--n500);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .btn-remove:hover{background:#fde8e8;color:var(--error);}

  .btn{font-family:var(--font-ui);font-size:14px;font-weight:500;padding:10px 22px;border-radius:8px;
    border:none;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:8px;}
  .btn-primary{background:var(--primary-700);color:var(--white);}
  .btn-primary:hover{background:var(--primary-900);transform:translateY(-1px);box-shadow:var(--shadow-md);}
  .btn-secondary{background:var(--n100);color:var(--n700);border:1.5px solid var(--n100);}
  .btn-secondary:hover{background:var(--n50);}
  .btn-outline{background:transparent;color:var(--primary-700);border:1.5px solid var(--primary-300);}
  .btn-outline:hover{background:var(--primary-50);}

  .url-output{display:none;background:var(--primary-50);border:2px solid var(--primary-300);border-radius:var(--radius);padding:20px 24px;margin-top:20px;}
  .url-output.show{display:block;}
  .url-output h3{font-size:14px;font-weight:600;color:var(--primary-700);margin-bottom:10px;}
  .url-box{display:flex;gap:8px;align-items:center;}
  .url-box input{flex:1;font-family:var(--font-ui);font-size:12px;padding:9px 12px;
    border:1.5px solid var(--primary-300);border-radius:7px;background:var(--white);color:var(--n700);outline:none;}

  /* PATIENT / USER VIEW */
  .user-view{max-width:720px;margin:0 auto;padding:32px 20px 60px;}
  .user-header{text-align:center;padding:28px 24px 22px;background:var(--white);border-radius:14px;
    border:1.5px solid var(--n100);box-shadow:var(--shadow-sm);margin-bottom:24px;}
  .ph-label{font-size:11px;font-family:var(--font-ui);font-weight:700;color:var(--primary-500);
    letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
  .user-header h1{font-size:24px;font-weight:700;color:var(--n900);margin-bottom:6px;}
  .ph-meta{font-size:13px;color:var(--n500);margin-bottom:12px;}
  .ph-note{font-size:14px;background:var(--primary-50);border:1px solid var(--primary-100);border-radius:8px;
    padding:10px 14px;color:var(--n700);text-align:left;margin-top:8px;}

  .progress-summary{display:flex;gap:10px;align-items:center;padding:14px 20px;
    background:var(--white);border-radius:10px;border:1.5px solid var(--n100);margin-bottom:24px;}
  .ps-label{font-size:13px;color:var(--n500);flex:1;}
  .progress-bar{flex:2;height:8px;background:var(--n100);border-radius:4px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary-500),var(--primary-300));
    border-radius:4px;transition:width .5s ease;width:0%;}
  .ps-count{font-size:13px;font-family:var(--font-ui);font-weight:600;color:var(--primary-700);min-width:48px;text-align:right;}

  .category-section{margin-bottom:28px;}
  .cat-label-view{font-size:12px;font-family:var(--font-ui);font-weight:700;color:var(--primary-700);
    letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .cat-label-view::after{content:'';flex:1;height:1px;background:var(--primary-100);}

  .user-video-list{display:flex;flex-direction:column;gap:12px;}
  .pv-item{background:var(--white);border:1.5px solid var(--n100);border-radius:var(--radius);
    overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .15s;}
  .pv-item:hover{box-shadow:var(--shadow-md);}
  .pv-header{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;}
  .pv-num{width:28px;height:28px;border-radius:50%;background:var(--primary-100);color:var(--primary-700);
    font-size:13px;font-weight:700;font-family:var(--font-ui);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .pv-title{flex:1;font-size:15px;font-weight:600;}
  .pv-toggle{font-size:18px;color:var(--n300);transition:transform .2s;}
  .pv-item.open .pv-toggle{transform:rotate(90deg);}
  .pv-body{display:none;border-top:1.5px solid var(--n100);}
  .pv-item.open .pv-body{display:block;}
  .pv-embed{width:100%;height:56vw;border:none;display:block;}
  @media(min-width:601px){.pv-embed{height:400px;}}
  .pv-note{padding:12px 16px;font-size:13px;color:var(--n700);background:var(--n50);border-top:1px solid var(--n100);}

  .empty-state{text-align:center;padding:60px 20px;color:var(--n500);}
  .empty-state .ei{font-size:48px;margin-bottom:16px;}
  .empty-state h3{font-size:18px;margin-bottom:8px;color:var(--n700);}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--primary-700);color:white;
    padding:12px 20px;border-radius:10px;font-family:var(--font-ui);font-size:14px;
    box-shadow:var(--shadow-lg);transform:translateY(80px);opacity:0;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:300;}
  .toast.show{transform:translateY(0);opacity:1;}

  @media(max-width:600px){
    .form-row{grid-template-columns:1fr;}
    .staff-layout,.user-view{padding:12px;}
    .url-box{flex-direction:column;}
    .url-box input{width:100%;}

    /* トップバー：タブが1行に収まるように */
    .topbar{padding:0 12px;gap:8px;}
    .logo{font-size:11px;gap:6px;flex-shrink:1;min-width:0;overflow:hidden;white-space:nowrap;}
    .logo-mark img{height:24px;width:24px;}
    .mode-tabs{flex-shrink:0;}
    .mode-tab{font-size:11px;padding:5px 10px;white-space:nowrap;}

    /* 部位・目的タブを小さく */
    .cat-tab{font-size:11px;padding:4px 10px;}
    .cat-tabs-label{font-size:10px;}

    /* 動画の埋め込みサイズをiPhoneに最適化 */
    .pv-embed{width:100%;aspect-ratio:16/9;max-height:56vw;}
  }
</style>
</head>

  syncFromGAS(gasUrl);
};

async function loadUserFromId(id) {
  const el = document.getElementById('userView');
  el.innerHTML = `<div class="empty-state"><div class="ei">⏳</div><h3>読み込み中...</h3></div>`;
  try {
    const gasUrl = 'https://script.google.com/macros/s/AKfycbxaE1QQdLCRvDpFoWpsRirTLfP_KcKVp324yDoENpRIThpMWm06R9DzjJGWkzmI-4gm/exec';
    const res = await fetch(`${gasUrl}?action=load&id=${id}`);
    const json = await res.json();
    if (json.error || !json.data) throw new Error();
    renderUserView(json.data, id);
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="ei">❌</div>
      <h3>データの読み込みに失敗しました</h3>
      <p>URLが正しくないか、データが見つかりません</p></div>`;
  }
}

// ── GAS バックグラウンド同期 ──────────────────────
async function syncFromGAS(url) {
  try {
    const res = await fetch(`${url}?action=videos`);
    if (!res.ok) throw new Error();
    const text = await res.text();
    let parsed = [];
    if (text.trim().startsWith('{')) {
      const json = JSON.parse(text);
      parsed = (json.videos || []).filter(v => v.title && v.url);
    } else {
      const rows = text.trim().split('\n').slice(1);
      parsed = rows.map((row, i) => {
        const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g,''));
        return { id:'s'+i, part: cols[0]||'その他', purpose: cols[1]||'', title: cols[2]||'', url: cols[3]||'' };
      }).filter(v => v.title && v.url);
    }
    if (parsed.length) {
      videoLibrary = parsed;
      localStorage.setItem('lg_videos', JSON.stringify(videoLibrary));
    }
  } catch(e) {
    // 失敗時はキャッシュ済みデータをそのまま使用
  } finally {
    renderCatTabs();
    renderVideoGrid();
  }
}

// GAS URL の登録・確認（初回のみコンソールから実行）
// localStorage.setItem('lg_gasUrl', 'https://script.google.com/macros/s/xxxxx/exec')

function switchMode(mode) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.mode-tab').forEach((t,i) => t.classList.toggle('active', mode==='staff'?i===0:i===1));
  document.getElementById(mode==='staff' ? 'staffPage' : 'userPage').classList.add('active');
  if (mode === 'user') {
    const url = document.getElementById('generatedUrl')?.value;
    if (url && url.includes('?id=')) {
      const id = new URLSearchParams(url.split('?')[1]).get('id');
      if (id) { loadUserFromId(id); return; }
    }
    if (url && url.includes('#data=')) {
      loadUserFromHash(url.split('#data=')[1]);
      return;
    }
    document.getElementById('userView').innerHTML = `
      <div class="empty-state"><div class="ei">📋</div>
      <h3>URLを生成してください</h3>
      <p>スタッフ画面で利用者URLを生成すると、ここでプレビューできます</p></div>`;
  }
}

function renderCatTabs() {
  const parts = ['すべて', ...new Set(videoLibrary.map(v=>v.part))];
  const purposes = ['すべて', ...new Set(videoLibrary.map(v=>v.purpose).filter(Boolean))];
  document.getElementById('partTabs').innerHTML = parts.map(c =>
    `<button class="cat-tab${c===activePart?' active':''}" onclick="setPart('${c}')">${c}</button>`
  ).join('');
  document.getElementById('purposeTabs').innerHTML = purposes.map(c =>
    `<button class="cat-tab purpose-tab${c===activePurpose?' active':''}" onclick="setPurpose('${c}')">${c}</button>`
  ).join('');
}
function setPart(c) { activePart=c; renderCatTabs(); renderVideoGrid(); }
function setPurpose(c) { activePurpose=c; renderCatTabs(); renderVideoGrid(); }

function renderVideoGrid() {
  let filtered = videoLibrary;
  if (activePart!=='すべて') filtered = filtered.filter(v=>v.part===activePart);
  if (activePurpose!=='すべて') filtered = filtered.filter(v=>v.purpose===activePurpose);

  const el = document.getElementById('videoGrid');
  if (!filtered.length) {
    el.innerHTML = '<div style="color:var(--n300);font-size:13px;">該当する動画はありません</div>';
    return;
  }

  // 部位ごとにグループ化して表示（目的順にソート）
  const parts = [...new Set(filtered.map(v=>v.part))];
  el.innerHTML = parts.map(part => {
    const vids = filtered.filter(v=>v.part===part)
      .sort((a,b) => purposeRank(a.purpose) - purposeRank(b.purpose));
    return `<div class="video-group">
      <div class="video-group-title">${escHtml(part)}</div>
      ${vids.map(v => {
        const sel = selectedVideos.some(s=>s.id===v.id);
        return `<div class="video-row${sel?' selected':''}" onclick="toggleVideo('${v.id}')">
          <div class="vr-check">✓</div>
          <div class="vr-info">
            <span class="vr-name">${escHtml(v.title)}</span>
            <div class="vr-tags">
              <span class="vr-cat">${escHtml(v.part)}</span>
              ${v.purpose?`<span class="vr-purpose">${escHtml(v.purpose)}</span>`:''}
            </div>
          </div>
          <button class="vr-preview" onclick="openPreview(event,'${v.id}')">▶</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function openPreview(e, id) {
  e.stopPropagation();
  const v = videoLibrary.find(x=>x.id===id);
  if (!v) return;
  document.getElementById('previewTitle').textContent = v.title;
  document.getElementById('previewEmbed').src = embedUrl(v.url);
  document.getElementById('previewModal').classList.add('show');
}
function closePreviewBtn() {
  document.getElementById('previewEmbed').src = '';
  document.getElementById('previewModal').classList.remove('show');
}
function closePreview(e) {
  if (e.target === document.getElementById('previewModal')) closePreviewBtn();
}

function toggleVideo(id) {
  const v = videoLibrary.find(x=>x.id===id);
  if (!v) return;
  const idx = selectedVideos.findIndex(s=>s.id===id);
  if (idx>=0) selectedVideos.splice(idx,1);
  else selectedVideos.push({...v, note:''});
  renderVideoGrid();
  renderSelected();
}

function openAddModal() {
  document.getElementById('newVideoTitle').value = '';
  document.getElementById('newVideoUrl').value = '';
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('newVideoTitle').focus(), 100);
}
function closeAddModalBtn() {
  document.getElementById('addModal').classList.remove('show');
}
function closeAddModal(e) {
  if (e.target === document.getElementById('addModal')) closeAddModalBtn();
}

function addCustomVideo() {
  const title = document.getElementById('newVideoTitle').value.trim();
  const url = document.getElementById('newVideoUrl').value.trim();
  const part = document.getElementById('newVideoPart').value;
  const purpose = document.getElementById('newVideoPurpose').value;
  if (!title||!url) { toast('タイトルとURLを入力してください'); return; }
  const id = 'cv'+Date.now();
  videoLibrary.push({id,title,part,purpose,url});
  localStorage.setItem('lg_videos', JSON.stringify(videoLibrary));
  closeAddModalBtn();
  activePart = part; activePurpose = 'すべて';
  renderCatTabs();
  renderVideoGrid();
  toast('動画を追加しました');
}

function renderSelected() {
  const el = document.getElementById('selectedList');
  document.getElementById('selectedCount').textContent = selectedVideos.length;
  if (!selectedVideos.length) {
    el.innerHTML = '<div style="color:var(--n300);font-size:13px;padding:8px 0;">まだ動画が選択されていません</div>';
    return;
  }
  el.innerHTML = selectedVideos.map((v,i) => `
    <div class="video-row selected" style="cursor:default;">
      <div class="vr-info">
        <span class="vr-name">${escHtml(v.title)}</span>
        <div class="vr-tags">
          <span class="vr-cat">${escHtml(v.part)}</span>
          ${v.purpose?`<span class="vr-purpose">${escHtml(v.purpose)}</span>`:''}
        </div>
      </div>
      <input type="text" placeholder="メモ（例：10回×2セット）" value="${escHtml(v.note||'')}"
        style="flex:1.2;font-size:12px;padding:5px 8px;border:1px solid var(--n100);border-radius:5px;outline:none;min-width:0;"
        oninput="selectedVideos[${i}].note=this.value" />
      <button class="btn-remove" onclick="removeSelected(${i})">×</button>
    </div>`).join('');
}
function removeSelected(i) { selectedVideos.splice(i,1); renderVideoGrid(); renderSelected(); }

async function generateUrl() {
  const name = document.getElementById('userName').value.trim();
  if (!name) { toast('利用者名を入力してください'); return; }
  if (!selectedVideos.length) { toast('動画を1本以上選択してください'); return; }
  const data = {
    name,
    date: document.getElementById('prescDate').value,
    note: document.getElementById('userNote').value.trim(),
    videos: selectedVideos.map(v=>({id:v.id,title:v.title,part:v.part,purpose:v.purpose,url:v.url,note:v.note||''}))
  };

  document.getElementById('urlOutput').classList.add('show');
  document.getElementById('generatedUrl').value = '生成中...';
  document.getElementById('shortenStatus').textContent = '⏳ URLを生成中...';

  try {
    const gasUrl = 'https://script.google.com/macros/s/AKfycbxaE1QQdLCRvDpFoWpsRirTLfP_KcKVp324yDoENpRIThpMWm06R9DzjJGWkzmI-4gm/exec';
    const res = await fetch(gasUrl, {
      method: 'POST',
      body: JSON.stringify({ action: 'save', data })
    });
    const json = await res.json();
    if (!json.id) throw new Error();
    const shortUrl = `${location.origin}${location.pathname}?id=${json.id}`;
    document.getElementById('generatedUrl').value = shortUrl;
    document.getElementById('shortenStatus').textContent = '✅ URLを生成しました';
    toast('URLを生成しました！');
  } catch(e) {
    // フォールバック: 元のBase64方式
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const longUrl = `${location.origin}${location.pathname}#data=${encoded}`;
    document.getElementById('generatedUrl').value = longUrl;
    document.getElementById('shortenStatus').textContent = '⚠️ サーバー保存に失敗したため長いURLを使用しています';
    toast('URLを生成しました（長いURL）');
  }
}

function copyUrl() {
  const val = document.getElementById('generatedUrl').value;
  navigator.clipboard.writeText(val)
    .then(()=>toast('URLをコピーしました ✓'))
    .catch(()=>{ const el=document.getElementById('generatedUrl'); el.select(); document.execCommand('copy'); toast('URLをコピーしました ✓'); });
}

function clearAll() {
  selectedVideos=[];
  document.getElementById('userName').value='';
  document.getElementById('userNote').value='';
  document.getElementById('urlOutput').classList.remove('show');
  renderVideoGrid(); renderSelected();
}

function loadUserFromHash(encoded) {
  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(encoded))));
    renderUserView(data, encoded);
  } catch(e) {
    document.getElementById('userView').innerHTML = `
      <div class="empty-state"><div class="ei">❌</div>
      <h3>データの読み込みに失敗しました</h3>
      <p>URLが正しくない可能性があります</p></div>`;
  }
}

function renderUserView(data, encoded) {
  const parts = [...new Set((data.videos||[]).map(v=>v.part))];
  const watchKey = 'lg_w_' + (encoded||'').slice(0,20);
  let watched = JSON.parse(localStorage.getItem(watchKey)||'[]');
  const total = (data.videos||[]).length;
  const pct = total ? Math.round(watched.length/total*100) : 0;

  document.getElementById('userView').innerHTML = `
    <div class="user-header">
      <div class="ph-label">自主トレプログラム</div>
      <h1>${escHtml(data.name)} さん</h1>
      <div class="ph-meta">${data.date?data.date:''}</div>
      ${data.note?`<div class="ph-note">📋 ${escHtml(data.note)}</div>`:''}
    </div>
    <div class="progress-summary">
      <span class="ps-label">本日の進捗</span>
      <div class="progress-bar"><div class="progress-bar-fill" id="progFill" style="width:${pct}%"></div></div>
      <span class="ps-count" id="progCount">${watched.length} / ${total}</span>
    </div>
    ${parts.map(part => {
      const vids = (data.videos||[]).filter(v=>v.part===part)
          .sort((a,b) => purposeRank(a.purpose) - purposeRank(b.purpose));
      return `<div class="category-section">
        <div class="cat-label-view">${escHtml(part)}</div>
        <div class="user-video-list">
          ${vids.map((v,i) => {
            const done = watched.includes(v.id||v.url);
            return `<div class="pv-item${done?' open':''}">
              <div class="pv-header" onclick="togglePV(this,'${watchKey}','${escAttr(v.id||v.url)}',${total})">
                <div class="pv-num" style="${done?'background:var(--primary-500);color:white':''}">${done?'✓':(i+1)}</div>
                <div class="pv-title">${escHtml(v.title)}${v.purpose?` <span style="font-size:11px;font-weight:500;color:var(--n500);">（${escHtml(v.purpose)}）</span>`:''}</div>
                <div class="pv-toggle">▶</div>
              </div>
              <div class="pv-body">
                <iframe class="pv-embed" src="${embedUrl(v.url)}" allowfullscreen
                  allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>
                ${v.note?`<div class="pv-note"><strong>📝 メモ：</strong>${escHtml(v.note)}</div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}`;
}

function togglePV(header, watchKey, vid, total) {
  const item = header.parentElement;
  const wasOpen = item.classList.contains('open');
  item.classList.toggle('open');
  if (!wasOpen) {
    let watched = JSON.parse(localStorage.getItem(watchKey)||'[]');
    if (!watched.includes(vid)) { watched.push(vid); localStorage.setItem(watchKey, JSON.stringify(watched)); }
    const pct = Math.round(watched.length/total*100);
    const fill = document.getElementById('progFill');
    if (fill) fill.style.width=pct+'%';
    const cnt = document.getElementById('progCount');
    if (cnt) cnt.textContent=watched.length+' / '+total;
    const num = header.querySelector('.pv-num');
    if (num){ num.style.background='var(--primary-500)'; num.style.color='white'; num.textContent='✓'; }
  }
}

function embedUrl(url) {
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
  const gd = url.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
  if (gd) return `https://drive.google.com/file/d/${gd[1]}/preview`;
  return url;
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function escAttr(s){ return String(s||'').replace(/'/g,"\\'"); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2800);
}
</script>
